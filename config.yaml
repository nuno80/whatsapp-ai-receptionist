client:
  name: "B&B Roma"
  timezone: "Europe/Rome"

modules:
  booking: true
  payments: true
  reminders: true
  ota_sync: false

whatsapp:
  phone_number_id: "${WHATSAPP_PHONE_NUMBER_ID}"
  verify_token: "${WHATSAPP_VERIFY_TOKEN}"

bot_persona:
  name: "Giulia"
  tone: "cordiale-professionale"
  declares_as_ai: true

authorized_approvers:
  - phone: "+39 392937505"
    name: "Maria"
  - phone: "+39 3XX XXXXXXX2"
    name: "Famiglia 2"
  - phone: "+39 3XX XXXXXXX3"
    name: "Famiglia 3"
  - phone: "+39 3XX XXXXXXX4"
    name: "Famiglia 4"

booking:
  calendar_id: "${GOOGLE_CALENDAR_ID}"
  calendar_owner_email: "${GOOGLE_CALENDAR_OWNER_EMAIL}"
  max_guests: 2
  checkin_time: "15:00"
  checkout_time: "10:00"
  cancellation_policy:
    free_cancellation_days_before: 7
  pricing_periods:
    - start_date: "2024-01-01"
      end_date: "2030-12-31"
      price_per_night: 120

    # Luglio e Agosto: base 70€
    - start_date: "2024-07-01"
      end_date: "2024-08-31"
      price_per_night: 70

    # Luglio e Agosto: Venerdì (5) e Sabato (6) a 90€
    - start_date: "2024-07-01"
      end_date: "2024-08-31"
      price_per_night: 90
      days_of_week: [5, 6]

    # Settembre: base 85€
    - start_date: "2024-09-01"
      end_date: "2024-09-30"
      price_per_night: 85

    # Settembre: Venerdì (5) e Sabato (6) a 100€
    - start_date: "2024-09-01"
      end_date: "2024-09-30"
      price_per_night: 100
      days_of_week: [5, 6]
  minimum_stay_periods:
    - start_date: "2026-01-01"
      end_date: "2026-12-31"
      min_nights: 2

payment_mode: deposit
deposit_percentage: 30

payments:
  provider: stripe
  currency: eur

ota:
  ical_urls: []
  poll_minutes: 30

reminders:
  hours_before: 48
